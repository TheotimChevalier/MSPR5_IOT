services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mqtt_broker
    ports:
      - "1884:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  postgres:
    image: postgres:15
    container_name: mqtt_postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: sensors
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d sensors"]
      interval: 5s
      timeout: 5s
      retries: 10

  mqtt_collector:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mqtt_collector
    depends_on:
      mosquitto:
        condition: service_started
    environment:
      PYTHONUNBUFFERED: "1"
      MQTT_BROKER: mosquitto
      MQTT_PORT: 1883
      MQTT_TOPIC: capteur/#
      TEMPERATURE_TOPIC: capteur/temperature
      HUMIDITY_TOPIC: capteur/humidite
      SENSOR_ID: ESP8266_DHT11
      INSERT_INTERVAL_SECONDS: 3
      DB_HOST: db-brazil
      DB_PORT: 5432
      DB_NAME: futurekawa_brazil
      DB_USER: futurekawa
      DB_PASSWORD: futurekawa_pwd
    networks:
      - default
      - brazil_backend

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: mqtt_pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8081:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:

networks:
  brazil_backend:
    external: true
    name: mspr5_serveurs_default